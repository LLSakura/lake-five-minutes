<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>湖边五分钟</title>
    <link rel="stylesheet" href="styles.css?v=20260508-dex-fish-art">
  </head>
  <body>
    <main class="app-shell">
      <section class="game-area" aria-label="湖边五分钟游戏区域">
        <div class="top-bar">
          <div>
            <h1>湖边五分钟</h1>
            <p id="seasonLabel">春日湖畔</p>
          </div>
          <div class="stats">
            <span id="timer">05:00</span>
            <span id="coins">0 金币</span>
          </div>
        </div>

        <div class="canvas-frame">
          <canvas id="gameCanvas" width="960" height="540" aria-label="钓鱼游戏画面"></canvas>
          <div id="toast" class="toast" hidden></div>
        </div>

        <div class="action-row primary-actions">
          <button id="castButton" type="button">抛竿</button>
          <button type="button" data-open-panel="basket">鱼篓</button>
          <button type="button" data-open-panel="shop">商店</button>
          <button type="button" data-open-panel="quests">任务</button>
          <button type="button" data-open-panel="dex">图鉴</button>
          <button id="newRunButton" type="button">新一局</button>
        </div>
      </section>
    </main>

    <div id="panelLayer" class="panel-layer" hidden>
      <section id="basketPanel" class="panel-block game-window" data-panel="basket" hidden>
        <button class="window-close" type="button" data-close-panel aria-label="关闭鱼篓">×</button>
        <h2>鱼篓</h2>
        <div id="basket" class="basket empty">还没有鱼</div>
        <button id="sellButton" type="button">卖出鱼篓</button>
      </section>

      <section id="shopPanel" class="panel-block game-window" data-panel="shop" hidden>
        <button class="window-close" type="button" data-close-panel aria-label="关闭商店">×</button>
        <h2>商店</h2>
        <div id="upgrades" class="upgrade-list"></div>
      </section>

      <section id="questsPanel" class="panel-block game-window" data-panel="quests" hidden>
        <button class="window-close" type="button" data-close-panel aria-label="关闭任务">×</button>
        <h2>本局任务</h2>
        <div id="quests" class="quest-list"></div>
      </section>

      <section id="dexPanel" class="panel-block game-window" data-panel="dex" hidden>
        <button class="window-close" type="button" data-close-panel aria-label="关闭图鉴">×</button>
        <h2>图鉴</h2>
        <div class="dex-filters" aria-label="图鉴筛选">
          <label>
            季节
            <select id="dexSeasonFilter">
              <option value="all">全部</option>
              <option value="spring">春</option>
              <option value="summer">夏</option>
              <option value="autumn">秋</option>
              <option value="winter">冬</option>
            </select>
          </label>
          <label>
            稀有度
            <select id="dexRarityFilter">
              <option value="all">全部</option>
              <option value="1">常见</option>
              <option value="2">少见</option>
              <option value="3">稀有</option>
              <option value="4">传说</option>
            </select>
          </label>
        </div>
        <div id="dex" class="dex-grid"></div>
      </section>
    </div>

    <div id="summaryModal" class="modal" hidden>
      <div class="modal-card">
        <h2>本局结算</h2>
        <div id="summaryBody"></div>
        <button id="summaryRestart" type="button">再来一局</button>
      </div>
    </div>

    <div id="catchResultModal" class="modal catch-result-modal" hidden>
      <div id="catchResultCard" class="modal-card catch-card">
        <h2>钓到了！</h2>
        <div id="catchResultBody" class="catch-result-body"></div>
        <div class="catch-actions">
          <button id="catchToBasketButton" type="button">放入鱼篓</button>
          <button id="catchSellButton" type="button">直接卖掉</button>
        </div>
      </div>
    </div>

    <script src="game.js?v=20260508-dex-fish-art"></script>
  </body>
</html>
